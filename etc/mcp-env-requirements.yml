# MCP環境変数要件定義
# MCPごとに必須となる環境変数を定義します
#
# 形式:
#   MCP識別子:
#     - 環境変数名1
#     - 環境変数名2

"@modelcontextprotocol/server-gitlab":
  - GITLAB_PERSONAL_ACCESS_TOKEN
  - GITLAB_API_URL

"mcp/gitlab":
  - GITLAB_PERSONAL_ACCESS_TOKEN
  - GITLAB_API_URL

# MCP前提条件定義
# MCPサービスごとに実行が必要な前提コマンドを定義します
#
# 形式:
#   サービス名:
#     prerequisites:
#       - command: 実行するコマンド
#         description: コマンドの説明
#         check: 前提条件が満たされているかのチェックコマンド（オプション）
#         host: true  # ホスト側で実行する場合（デフォルトはfalse）

playwright:
  prerequisites:
    - command: "xhost +local:docker 2>/dev/null || true"
      description: "X11ディスプレイへのDockerアクセスを許可"
      check: "xhost 2>/dev/null | grep -q 'LOCAL:' || [ -n \"$SSH_CONNECTION\" ]"
      host: true
    # コンテナ内で実行する前提条件の例
    # - command: "npm install -g some-package"
    #   description: "必要なパッケージをインストール"
    #   host: false
